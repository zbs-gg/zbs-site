<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <defs>
    <style><![CDATA[
      .mono  { font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace; }
      .fg    { fill: #ffffff; }
      .dim   { fill: rgba(255,255,255,0.55); }
      .faint { fill: rgba(255,255,255,0.32); }
      .rule  { stroke: rgba(255,255,255,0.18); stroke-width: 1; }
    ]]></style>
  </defs>

  <rect width="720" height="160" fill="#050505"/>

  <!-- mark: bracket + dot. "lab signal in a frame." -->
  <g transform="translate(40, 50)">
    <path d="M 0 0 L 0 60 M 0 0 L 14 0 M 0 60 L 14 60" class="rule" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M 70 0 L 70 60 M 70 0 L 56 0 M 70 60 L 56 60" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="35" cy="30" r="4" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="150" y="78" class="mono fg" font-size="48" letter-spacing="6" font-weight="500">ZBS GG</text>
  <text x="152" y="104" class="mono dim" font-size="12" letter-spacing="3">INDEPENDENT RESEARCH LAB</text>
</svg>
