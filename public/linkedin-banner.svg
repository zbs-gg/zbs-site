<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7df9ff"/>
      <stop offset="30%"  stop-color="#c084fc"/>
      <stop offset="55%"  stop-color="#ff9ad6"/>
      <stop offset="78%"  stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#7df9ff"/>
    </linearGradient>
    <radialGradient id="halo1" cx="22%" cy="40%" r="40%">
      <stop offset="0%"   stop-color="rgba(192,132,252,0.18)"/>
      <stop offset="100%" stop-color="rgba(192,132,252,0)"/>
    </radialGradient>
    <radialGradient id="halo2" cx="80%" cy="70%" r="35%">
      <stop offset="0%"   stop-color="rgba(125,249,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(125,249,255,0)"/>
    </radialGradient>
    <style><![CDATA[
      .mono { font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace; }
      .fg     { fill: #f5f5f5; }
      .dim    { fill: rgba(245,245,245,0.55); }
      .faint  { fill: rgba(245,245,245,0.35); }
      .holo   { fill: url(#holo); }
      .rule   { stroke: rgba(245,245,245,0.12); stroke-width: 1; }
    ]]></style>
  </defs>

  <rect width="1584" height="396" fill="#050505"/>
  <rect width="1584" height="396" fill="url(#halo1)"/>
  <rect width="1584" height="396" fill="url(#halo2)"/>

  <!-- LEFT: brand + hero -->
  <text x="72" y="50" class="mono faint" font-size="13" letter-spacing="6">▪ INDEPENDENT RESEARCH LAB</text>
  <text x="72" y="92" class="mono fg" font-size="32" font-weight="500" letter-spacing="8">ZBS GG</text>
  <text x="72" y="115" class="mono dim" font-size="12" letter-spacing="2">zbs · gg · twice good. unironically.</text>

  <text x="72" y="200" class="mono fg" font-size="50" letter-spacing="-1" font-weight="400">memory that knows</text>
  <text x="72" y="252" class="mono dim" font-size="50" letter-spacing="-1" font-weight="400">what matters.</text>

  <line x1="72" y1="290" x2="900" y2="290" class="rule"/>
  <text x="72" y="318" class="mono dim" font-size="13" letter-spacing="1.5">
    Garden.Pulse · Garden.Heart · Garden.Emo.Bench · MIT · phuket
  </text>
  <text x="72" y="344" class="mono faint" font-size="13" letter-spacing="1.5">
    zbs.gg  ·  github.com/nikshilov
  </text>

  <!-- RIGHT: numbers stack -->
  <g transform="translate(960, 50)">
    <text x="0" y="0" class="mono faint" font-size="13" letter-spacing="3">▪ EMPATHIC MEMORY BENCH v3</text>

    <text x="0" y="42" class="mono fg" font-size="17" font-weight="500">Pulse v3 leads stateful axis</text>
    <text x="0" y="64" class="mono dim" font-size="14">
      Δ <tspan class="holo" font-weight="500">+3.44</tspan> vs Mem0  ·
      <tspan class="holo" font-weight="500">+2.07</tspan> vs cosine_state
    </text>
    <text x="0" y="82" class="mono faint" font-size="11">label-blind judges, 0–10 scale</text>

    <text x="0" y="120" class="mono fg" font-size="17" font-weight="500">cross-vendor label-blind</text>
    <text x="0" y="142" class="mono dim" font-size="14">
      α<tspan baseline-shift="sub" font-size="10">stateful</tspan> = <tspan class="holo" font-weight="500">0.699</tspan> · 3 vendor families
    </text>
    <text x="0" y="160" class="mono faint" font-size="11">Anthropic Claude  ·  OpenAI GPT-5.4  ·  xAI Grok 4</text>

    <text x="0" y="198" class="mono fg" font-size="17" font-weight="500">external benchmarks</text>
    <text x="0" y="220" class="mono dim" font-size="14">
      LongMemEval <tspan class="holo" font-weight="500">68.89%</tspan>  ·
      ES-MemEval <tspan class="holo" font-weight="500">76%</tspan>  ·
      LoCoMo <tspan class="holo" font-weight="500">32.51%</tspan> F1
    </text>
    <text x="0" y="238" class="mono faint" font-size="11">corpus + judge prompts + raw JSON · MIT</text>
  </g>
</svg>
