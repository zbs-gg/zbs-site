      .box { fill: rgba(255,255,255,0.025); stroke: rgba(247,247,247,0.13); stroke-width: 1; }
      .badge { fill: rgba(125,249,255,0.055); stroke: rgba(125,249,255,0.26); stroke-width: 1; }
